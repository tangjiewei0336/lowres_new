# Pair-level MoE expert: eng_Latn -> tha_Thai
# Generated by scripts/moe/generate_pair_expert_assets.py
# Run with:
#   llamafactory-cli train llamafactory_qwen3_8b_moe_eng_Latn_to_tha_Thai.yaml

### model
model_name_or_path: '/root/lowres_new/models/Qwen3-8B_latest'
trust_remote_code: true

### method
stage: sft
do_train: true
finetuning_type: lora
lora_rank: 8
lora_target: all

### dataset
dataset_dir: '/root/lowres_new/training/data'
dataset: nllb_moe_eng_Latn_to_tha_Thai
template: qwen
cutoff_len: 512
overwrite_cache: true
preprocessing_num_workers: 4

### output
output_dir: '/root/lowres_new/models/Qwen3-8B_moe_pair_experts/qwen3_8b_moe_eng_Latn_to_tha_Thai'
logging_steps: 20
save_steps: 200
plot_loss: true
overwrite_output_dir: true

### train
per_device_train_batch_size: 4
gradient_accumulation_steps: 8
learning_rate: 2.0e-5
num_train_epochs: 1
lr_scheduler_type: cosine
warmup_ratio: 0.05
bf16: true
ddp_timeout: 180000000
