# Qwen3-4B + ccMatrix SFT (LoRA)
# 运行（在已安装 LLaMAFactory 的 conda env lowres 中）：
#   llamafactory-cli train /root/lowres_new/training/llamafactory_qwen3_4b_ccmatrix_sft_lora.yaml
#
# 前置：
# - 基座模型：/root/lowres_new/models/Qwen3-4B_20260407_033755 （通过 ModelScope 下载）
# - 训练数据：在 LLaMAFactory 的 data/dataset_info.json 注册 dataset=ccmatrix_mt

### model
model_name_or_path: /root/lowres_new/models/Qwen3-4B_20260407_033755
trust_remote_code: true

### method
stage: sft
do_train: true
finetuning_type: lora
lora_rank: 8
lora_target: all

### dataset
dataset_dir: /root/lowres_new/training/data
dataset: ccmatrix_mt
template: qwen
cutoff_len: 512
overwrite_cache: true
preprocessing_num_workers: 4

### output
output_dir: /root/lowres_new/models/Qwen3-4B_20260407_033755_ccmatrix_sft_lora
logging_steps: 20
save_steps: 500
plot_loss: true
overwrite_output_dir: true

### train
per_device_train_batch_size: 2
gradient_accumulation_steps: 8
learning_rate: 2.0e-5
num_train_epochs: 1
lr_scheduler_type: cosine
warmup_ratio: 0.05
bf16: true
ddp_timeout: 180000000

### eval（可选）
# val_size: 0.01
# eval_strategy: steps
# eval_steps: 500

